# ─────────────────────────────────────────────────────────────────────────────
# configtx.yaml — FactureChain / ENEO Cameroun
# Définit les organisations, le profil du réseau et le channel
# Commande génération genesis : configtxgen -profile FactureChainGenesis -channelID system-channel -outputBlock ./channel-artifacts/genesis.block
# Commande génération channel : configtxgen -profile FactureChainChannel -outputCreateChannelTx ./channel-artifacts/mychannel.tx -channelID mychannel
# ─────────────────────────────────────────────────────────────────────────────

Organizations:

  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/eneo.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &EneoOrg
    Name: EneoOrg
    ID: EneoMSP
    MSPDir: crypto-config/peerOrganizations/eneo.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('EneoMSP.admin', 'EneoMSP.peer', 'EneoMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('EneoMSP.admin', 'EneoMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('EneoMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('EneoMSP.peer')"
    AnchorPeers:
      - Host: peer0.eneo.com
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.eneo.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.eneo.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/eneo.com/orderers/orderer.eneo.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/eneo.com/orderers/orderer.eneo.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:

  FactureChainGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      FactureChainConsortium:
        Organizations:
          - *EneoOrg

  FactureChainChannel:
    Consortium: FactureChainConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *EneoOrg
