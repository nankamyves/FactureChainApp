spring:
  application:
    name: facturechain-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/facturechain_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        [format_sql]: true
        [use_sql_comments]: true
    show-sql: false

  security:
    user:
      name: admin
      password: admin123

jwt:
  secret: your-secret-key-that-should-be-at-least-256-bits-for-HS256-algorithm-and-should-be-very-secure-change-this-in-production
  expiration: 86400000
  refresh:
    expiration: 604800000

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    [com.facturechain]: DEBUG
    [org.springframework.security]: DEBUG
    [org.springframework.web]: DEBUG
